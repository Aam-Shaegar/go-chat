<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoChat</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0e0e10;
      --bg2:     #17171a;
      --bg3:     #1e1e22;
      --border:  #2a2a30;
      --accent:  #6c63ff;
      --accent2: #4f46e5;
      --text:    #e8e8ed;
      --muted:   #6b6b80;
      --danger:  #ef4444;
      --success: #22c55e;
      --sidebar: 264px;
    }

    body { font-family: 'Geist', sans-serif; background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; }

    /* ── AUTH ── */
    #auth-screen { height: 100dvh; display: flex; align-items: center; justify-content: center; }

    .auth-card { width: 360px; background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; }

    .auth-logo { font-family: 'Geist Mono', monospace; font-size: 20px; font-weight: 500; color: var(--accent); margin-bottom: 1.5rem; }
    .auth-logo span { color: var(--muted); }

    .auth-tabs { display: flex; gap: 4px; background: var(--bg3); border-radius: 8px; padding: 3px; margin-bottom: 1.25rem; }
    .auth-tab { flex: 1; padding: 7px; border: none; border-radius: 6px; background: transparent; color: var(--muted); font-size: 13px; font-family: 'Geist', sans-serif; cursor: pointer; transition: all .15s; }
    .auth-tab.active { background: var(--bg2); color: var(--text); }

    .field { margin-bottom: 10px; }
    .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
    .field input { width: 100%; padding: 10px 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; font-family: 'Geist', sans-serif; outline: none; transition: border-color .15s; }
    .field input:focus { border-color: var(--accent); }

    .btn-primary { width: 100%; padding: 10px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 14px; font-family: 'Geist', sans-serif; font-weight: 500; cursor: pointer; margin-top: 4px; transition: background .15s, transform .1s; }
    .btn-primary:hover { background: var(--accent2); }
    .btn-primary:active { transform: scale(.98); }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; }

    .auth-error { margin-top: 10px; font-size: 13px; color: var(--danger); min-height: 18px; }

    /* ── APP ── */
    #app-screen { display: none; height: 100dvh; }

    .layout { display: grid; grid-template-columns: var(--sidebar) 1fr; height: 100dvh; }

    /* ── SIDEBAR ── */
    .sidebar { background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }

    .sidebar-top { padding: 14px 12px 10px; border-bottom: 1px solid var(--border); }
    .sidebar-brand { font-family: 'Geist Mono', monospace; font-size: 15px; font-weight: 500; color: var(--accent); margin-bottom: 10px; }

    .btn-new-room { width: 100%; padding: 8px 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; font-family: 'Geist', sans-serif; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 8px; transition: border-color .15s; }
    .btn-new-room:hover { border-color: var(--accent); color: var(--accent); }
    .plus { width: 18px; height: 18px; border-radius: 50%; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }

    .rooms-scroll { flex: 1; overflow-y: auto; }
    .rooms-scroll::-webkit-scrollbar { width: 4px; }
    .rooms-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .section-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px 5px; cursor: pointer; user-select: none; }
    .section-label { font-size: 10px; font-weight: 600; letter-spacing: .08em; color: var(--muted); text-transform: uppercase; }
    .section-chevron { font-size: 10px; color: var(--muted); transition: transform .2s; }
    .section-chevron.open { transform: rotate(90deg); }
    .section-body { padding: 2px 8px 6px; }
    .section-body.hidden { display: none; }

    .room-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 8px; cursor: pointer; transition: background .1s; margin-bottom: 1px; position: relative; }
    .room-item:hover { background: var(--bg3); }
    .room-item.active { background: rgba(108,99,255,.15); }
    .room-hash { font-size: 15px; color: var(--muted); font-family: 'Geist Mono', monospace; flex-shrink: 0; }
    .room-item.active .room-hash { color: var(--accent); }
    .room-info { flex: 1; overflow: hidden; }
    .room-item-name { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .room-item.active .room-item-name { color: var(--accent); }
    .room-item-desc { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }

    .sidebar-footer { padding: 12px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; }
    .user-info { flex: 1; overflow: hidden; }
    .user-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-status { font-size: 11px; color: var(--success); }
    .btn-logout { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 4px; border-radius: 6px; transition: color .15s; line-height: 1; }
    .btn-logout:hover { color: var(--danger); }

    /* ── CHAT ── */
    .chat { display: flex; flex-direction: column; height: 100dvh; background: var(--bg); }

    .chat-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--muted); }
    .chat-empty-icon { font-size: 48px; opacity: .3; }
    .chat-empty-text { font-size: 15px; }

    #chat-area { display: none; flex-direction: column; height: 100dvh; }

    .chat-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; background: var(--bg2); }
    .chat-header-hash { font-family: 'Geist Mono', monospace; font-size: 17px; color: var(--accent); }
    .chat-header-name { font-size: 15px; font-weight: 600; }
    .chat-header-meta { font-size: 12px; color: var(--muted); margin-left: 4px; }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .online-badge { font-size: 11px; color: var(--success); display: flex; align-items: center; gap: 4px; }
    .online-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); }
    .ws-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: background .3s; }
    .ws-dot.connected { background: var(--success); }
    .btn-delete-room { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 4px 6px; border-radius: 6px; transition: color .15s; display: none; }
    .btn-delete-room:hover { color: var(--danger); }
    .btn-delete-room.visible { display: block; }

    #messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 2px; }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .load-more-wrap { display: flex; justify-content: center; padding-bottom: 8px; }
    .btn-load-more { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-size: 12px; font-family: 'Geist', sans-serif; padding: 6px 16px; cursor: pointer; transition: border-color .15s; }
    .btn-load-more:hover { border-color: var(--accent); color: var(--accent); }

    .msg-group { display: flex; flex-direction: column; max-width: 65%; position: relative; }
    .msg-group + .msg-group { margin-top: 6px; }
    .msg-group.own { align-self: flex-end; align-items: flex-end; }
    .msg-group.other { align-self: flex-start; }

    .msg-meta { font-size: 11px; color: var(--muted); margin-bottom: 3px; padding: 0 4px; }
    .msg-bubble { padding: 9px 13px; border-radius: 14px; font-size: 14px; line-height: 1.55; word-break: break-word; position: relative; }
    .msg-group.own .msg-bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
    .msg-group.other .msg-bubble { background: var(--bg3); color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

    .msg-actions { position: absolute; top: -8px; right: 4px; display: none; gap: 2px; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 2px; }
    .msg-group:hover .msg-actions { display: flex; }
    .btn-del-msg { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 12px; padding: 3px 6px; border-radius: 4px; transition: color .15s, background .15s; line-height: 1; }
    .btn-del-msg:hover { color: var(--danger); background: rgba(239,68,68,.1); }

    .msg-deleted { font-style: italic; opacity: .4; font-size: 13px; }

    .system-msg { text-align: center; font-size: 11px; color: var(--muted); padding: 5px 0; font-family: 'Geist Mono', monospace; }

    #typing-bar { height: 20px; padding: 0 20px; font-size: 12px; color: var(--muted); font-style: italic; }

    .chat-input-wrap { padding: 10px 16px 14px; background: var(--bg2); border-top: 1px solid var(--border); }
    .chat-input-inner { display: flex; align-items: center; gap: 10px; background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 6px 6px 6px 14px; transition: border-color .15s; }
    .chat-input-inner:focus-within { border-color: var(--accent); }
    #message-input { flex: 1; background: none; border: none; color: var(--text); font-size: 14px; font-family: 'Geist', sans-serif; outline: none; padding: 6px 0; }
    #message-input::placeholder { color: var(--muted); }
    #send-btn { width: 36px; height: 36px; border-radius: 8px; background: var(--accent); border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background .15s, transform .1s; }
    #send-btn:hover { background: var(--accent2); }
    #send-btn:active { transform: scale(.92); }

    /* ── MODAL ── */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); backdrop-filter: blur(4px); align-items: center; justify-content: center; z-index: 999; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; width: 360px; }
    .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 1.25rem; }
    .modal .field input { background: var(--bg); }
    .modal-toggle { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; margin-bottom: 10px; }
    .modal-toggle span { font-size: 14px; }
    .modal-toggle small { font-size: 11px; color: var(--muted); display: block; }
    .toggle { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; inset: 0; background: var(--bg3); border: 1px solid var(--border); border-radius: 11px; cursor: pointer; transition: .2s; }
    .toggle-slider::before { content:''; position: absolute; width: 16px; height: 16px; border-radius: 50%; background: var(--muted); top: 2px; left: 2px; transition: .2s; }
    .toggle input:checked + .toggle-slider { background: var(--accent); border-color: var(--accent); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(18px); background: #fff; }
    .modal-actions { display: flex; gap: 8px; margin-top: 4px; }
    .btn-ghost { flex: 1; padding: 9px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; font-family: 'Geist', sans-serif; cursor: pointer; transition: border-color .15s; }
    .btn-ghost:hover { border-color: var(--muted); }
    .modal-actions .btn-primary { margin-top: 0; }

    .modal-danger { color: var(--danger); font-size: 14px; margin-bottom: 1.25rem; line-height: 1.5; }
    .btn-danger { flex: 1; padding: 9px; background: rgba(239,68,68,.1); border: 1px solid var(--danger); border-radius: 8px; color: var(--danger); font-size: 14px; font-family: 'Geist', sans-serif; cursor: pointer; transition: background .15s; }
    .btn-danger:hover { background: rgba(239,68,68,.2); }
  </style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">go<span>/</span>chat</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login">Войти</button>
      <button class="auth-tab" id="tab-register">Регистрация</button>
    </div>
    <div class="field"><label>Email</label><input id="auth-email" type="email" placeholder="you@example.com"></div>
    <div class="field" id="field-username" style="display:none"><label>Имя пользователя</label><input id="auth-username" type="text" placeholder="username"></div>
    <div class="field"><label>Пароль</label><input id="auth-password" type="password" placeholder="••••••••"></div>
    <button class="btn-primary" id="auth-submit">Войти</button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-top">
        <div class="sidebar-brand">go/chat</div>
        <button class="btn-new-room" id="btn-new-room"><span class="plus">+</span>Создать комнату</button>
      </div>
      <div class="rooms-scroll">
        <!-- Мои комнаты -->
        <div class="section-header" id="sec-my-header">
          <span class="section-label">Мои комнаты</span>
          <span class="section-chevron open" id="chev-my">▶</span>
        </div>
        <div class="section-body" id="sec-my-body"></div>
        <!-- Публичные -->
        <div class="section-header" id="sec-pub-header">
          <span class="section-label">Публичные</span>
          <span class="section-chevron open" id="chev-pub">▶</span>
        </div>
        <div class="section-body" id="sec-pub-body"></div>
      </div>
      <div class="sidebar-footer">
        <div class="user-avatar" id="user-avatar"></div>
        <div class="user-info">
          <div class="user-name" id="user-name"></div>
          <div class="user-status">онлайн</div>
        </div>
        <button class="btn-logout" id="btn-logout" title="Выйти">⏻</button>
      </div>
    </div>

    <!-- CHAT -->
    <div class="chat">
      <div class="chat-empty" id="chat-empty">
        <div class="chat-empty-icon">💬</div>
        <div class="chat-empty-text">Выберите комнату чтобы начать</div>
      </div>
      <div id="chat-area">
        <div class="chat-header">
          <span class="chat-header-hash">#</span>
          <span class="chat-header-name" id="chat-room-name"></span>
          <span class="chat-header-meta" id="chat-room-desc"></span>
          <div class="header-right">
            <div class="online-badge" id="online-badge" style="display:none">
              <div class="online-dot"></div>
              <span id="online-count"></span>
            </div>
            <button class="btn-delete-room" id="btn-delete-room" title="Удалить комнату">🗑</button>
            <div class="ws-dot" id="ws-dot"></div>
          </div>
        </div>
        <div id="messages"></div>
        <div id="typing-bar"></div>
        <div class="chat-input-wrap">
          <div class="chat-input-inner">
            <input id="message-input" type="text" placeholder="Написать сообщение...">
            <button id="send-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- MODAL: создать комнату -->
<div class="modal-overlay" id="modal-create">
  <div class="modal">
    <div class="modal-title">Новая комната</div>
    <div class="field"><label>Название</label><input id="new-room-name" type="text" placeholder="general"></div>
    <div class="field"><label>Описание</label><input id="new-room-desc" type="text" placeholder="О чём эта комната?"></div>
    <div class="modal-toggle">
      <div><span>Приватная</span><small>Только по инвайту</small></div>
      <label class="toggle"><input type="checkbox" id="new-room-private"><span class="toggle-slider"></span></label>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" id="modal-cancel">Отмена</button>
      <button class="btn-primary" id="modal-create-btn">Создать</button>
    </div>
  </div>
</div>

<!-- MODAL: удалить комнату -->
<div class="modal-overlay" id="modal-delete-room">
  <div class="modal">
    <div class="modal-title">Удалить комнату</div>
    <div class="modal-danger" id="delete-room-text"></div>
    <div class="modal-actions">
      <button class="btn-ghost" id="delete-room-cancel">Отмена</button>
      <button class="btn-danger" id="delete-room-confirm">Удалить</button>
    </div>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────
let token      = localStorage.getItem('gochat_token')
let currentUser= JSON.parse(localStorage.getItem('gochat_user') || 'null')
let currentRoom= null
let ws         = null
let typingTimer= null
let typingUsers= {}
let isLoginMode= true
let msgOffset  = 0
const MSG_LIMIT= 50

// ── AUTH ───────────────────────────────────────────────────

document.getElementById('tab-login').onclick    = () => switchTab(true)
document.getElementById('tab-register').onclick = () => switchTab(false)

function switchTab(login) {
  isLoginMode = login
  document.getElementById('tab-login').classList.toggle('active', login)
  document.getElementById('tab-register').classList.toggle('active', !login)
  document.getElementById('field-username').style.display = login ? 'none' : 'block'
  document.getElementById('auth-submit').textContent = login ? 'Войти' : 'Зарегистрироваться'
  document.getElementById('auth-error').textContent = ''
}

document.getElementById('auth-password').onkeydown = e => {
  if (e.key === 'Enter') document.getElementById('auth-submit').click()
}

document.getElementById('auth-submit').onclick = async () => {
  const email    = document.getElementById('auth-email').value.trim()
  const password = document.getElementById('auth-password').value
  const username = document.getElementById('auth-username').value.trim()
  if (!email || !password) { setAuthErr('Заполните все поля'); return }
  if (!isLoginMode && !username) { setAuthErr('Введите имя пользователя'); return }

  const btn = document.getElementById('auth-submit')
  btn.textContent = '...'; btn.disabled = true
  try {
    const path = isLoginMode ? '/api/auth/login' : '/api/auth/register'
    const body = isLoginMode ? { email, password } : { email, password, username }
    const data = await post(path, body)
    if (data.error) { setAuthErr(data.error); return }
    token       = data.access_token
    currentUser = data.user
    localStorage.setItem('gochat_token', token)
    localStorage.setItem('gochat_user', JSON.stringify(currentUser))
    showApp()
  } finally {
    btn.textContent = isLoginMode ? 'Войти' : 'Зарегистрироваться'
    btn.disabled = false
  }
}

function setAuthErr(msg) { document.getElementById('auth-error').textContent = msg }

// ── REFRESH TOKEN ──────────────────────────────────────────

async function refreshToken() {
  try {
    const res  = await fetch('/api/auth/refresh', { method: 'POST', credentials: 'include' })
    const data = await res.json()
    if (data.access_token) {
      token = data.access_token
      localStorage.setItem('gochat_token', token)
      return true
    }
  } catch {}
  return false
}

// Обёртка для fetch — при 401 пробуем рефреш
async function apiFetch(path, opts = {}) {
  opts.headers = { ...(opts.headers || {}), 'Authorization': 'Bearer ' + token }
  let res = await fetch(path, opts)
  if (res.status === 401) {
    const ok = await refreshToken()
    if (ok) {
      opts.headers['Authorization'] = 'Bearer ' + token
      res = await fetch(path, opts)
    } else {
      localStorage.clear()
      location.reload()
      return null
    }
  }
  return res
}

async function get(path) {
  const res = await apiFetch(path)
  return res ? res.json() : null
}

async function post(path, body) {
  const res = await apiFetch(path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  })
  return res ? res.json() : null
}

async function del(path) {
  const res = await apiFetch(path, { method: 'DELETE' })
  return res ? res.json() : null
}

// ── APP ────────────────────────────────────────────────────

function showApp() {
  document.getElementById('auth-screen').style.display = 'none'
  document.getElementById('app-screen').style.display  = 'block'
  document.getElementById('user-name').textContent   = currentUser.username
  document.getElementById('user-avatar').textContent = currentUser.username[0].toUpperCase()
  loadRooms()
}

document.getElementById('btn-logout').onclick = () => {
  if (ws) ws.close()
  localStorage.clear()
  location.reload()
}

// ── SECTIONS (сворачивание) ────────────────────────────────

function initSection(headerId, bodyId, chevId) {
  document.getElementById(headerId).onclick = () => {
    const body = document.getElementById(bodyId)
    const chev = document.getElementById(chevId)
    const open = !body.classList.contains('hidden')
    body.classList.toggle('hidden', open)
    chev.classList.toggle('open', !open)
  }
}

initSection('sec-my-header',  'sec-my-body',  'chev-my')
initSection('sec-pub-header', 'sec-pub-body', 'chev-pub')

// ── ROOMS ──────────────────────────────────────────────────

async function loadRooms() {
  const [myRooms, pubRooms] = await Promise.all([
    get('/api/rooms/my'),
    get('/api/rooms')
  ])

  const myIds = new Set((myRooms || []).map(r => r.id))

  renderRoomList('sec-my-body', myRooms || [], myIds)

  // публичные — исключаем те что уже в "моих"
  const pubOnly = (pubRooms || []).filter(r => !myIds.has(r.id))
  renderRoomList('sec-pub-body', pubOnly, myIds)
}

function renderRoomList(containerId, rooms, myIds) {
  const el = document.getElementById(containerId)
  el.innerHTML = ''
  if (!rooms.length) {
    el.innerHTML = '<div style="padding:6px 12px;font-size:12px;color:var(--muted)">Нет комнат</div>'
    return
  }
  rooms.forEach(room => {
    const item = document.createElement('div')
    item.className = 'room-item' + (currentRoom?.id === room.id ? ' active' : '')
    item.dataset.id = room.id
    item.innerHTML = `
      <span class="room-hash">#</span>
      <div class="room-info">
        <div class="room-item-name">${esc(room.name)}</div>
        ${room.description ? `<div class="room-item-desc">${esc(room.description)}</div>` : ''}
      </div>
    `
    item.onclick = () => openRoom(room)
    el.appendChild(item)
  })
}

async function openRoom(room) {
  if (currentRoom?.id === room.id) return

  await post(`/api/rooms/${room.id}/join`, {})
  currentRoom = room
  msgOffset   = 0

  document.querySelectorAll('.room-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === room.id)
  })

  document.getElementById('chat-empty').style.display = 'none'
  document.getElementById('chat-area').style.display  = 'flex'
  document.getElementById('chat-room-name').textContent = room.name
  document.getElementById('chat-room-desc').textContent = room.description || ''
  document.getElementById('messages').innerHTML = ''
  document.getElementById('typing-bar').textContent = ''
  document.getElementById('online-badge').style.display = 'none'
  typingUsers = {}

  // кнопка удаления — только для владельца
  const delBtn = document.getElementById('btn-delete-room')
  delBtn.classList.toggle('visible', room.owner_id === currentUser.id)

  // история
  await loadMessages(false)

  connectWS(room.id)
  scrollBottom()

  // обновляем список комнат чтобы новая комната появилась в "моих"
  loadRooms()
}

// ── MESSAGES HISTORY ───────────────────────────────────────

async function loadMessages(prepend) {
  if (!currentRoom) return
  const data = await get(`/api/rooms/${currentRoom.id}/messages?limit=${MSG_LIMIT}&offset=${msgOffset}`)
  if (!Array.isArray(data)) return

  const container = document.getElementById('messages')

  if (prepend) {
    // сохраняем скролл
    const prevHeight = container.scrollHeight
    data.forEach(msg => prependMessage(msg))
    container.scrollTop = container.scrollHeight - prevHeight
    if (data.length < MSG_LIMIT) {
      document.querySelector('.load-more-wrap')?.remove()
    }
  } else {
    data.forEach(msg => renderMessage(msg, ''))
    if (data.length === MSG_LIMIT) {
      addLoadMoreButton()
    }
  }
  msgOffset += data.length
}

function addLoadMoreButton() {
  const container = document.getElementById('messages')
  const existing = container.querySelector('.load-more-wrap')
  if (existing) return
  const wrap = document.createElement('div')
  wrap.className = 'load-more-wrap'
  wrap.innerHTML = '<button class="btn-load-more">Загрузить ещё</button>'
  wrap.querySelector('button').onclick = () => loadMessages(true)
  container.prepend(wrap)
}

// ── WEBSOCKET ──────────────────────────────────────────────

function connectWS(roomID) {
  if (ws) { ws.onclose = null; ws.close() }
  setWSDot(false)

  const url = `ws://${location.host}/ws/rooms/${roomID}?token=${token}&username=${encodeURIComponent(currentUser.username)}`
  ws = new WebSocket(url)

  ws.onopen = () => setWSDot(true)

  ws.onmessage = e => {
    const msg = JSON.parse(e.data)
    switch (msg.type) {
      case 'new_message':
        renderMessage(msg.payload.message, msg.payload.username)
        msgOffset++
        scrollBottom()
        break
      case 'user_typing':
        if (msg.payload.user_id !== currentUser.id) showTyping(msg.payload.username)
        break
      case 'user_joined':
        renderSystem(msg.payload.username + ' вошёл в комнату')
        break
      case 'user_left':
        renderSystem(msg.payload.username + ' покинул комнату')
        break
      case 'room_stats':
        updateOnlineCount(msg.payload.online_count)
        break
      case 'message_deleted':
        removeMessage(msg.payload.message_id)
        break
    }
  }

  ws.onclose = () => {
    setWSDot(false)
    setTimeout(() => { if (currentRoom?.id === roomID) connectWS(roomID) }, 2000)
  }

  ws.onerror = () => setWSDot(false)
}

function setWSDot(on) {
  document.getElementById('ws-dot').className = 'ws-dot' + (on ? ' connected' : '')
}

function updateOnlineCount(n) {
  const badge = document.getElementById('online-badge')
  document.getElementById('online-count').textContent = n + ' онлайн'
  badge.style.display = n > 0 ? 'flex' : 'none'
}

// ── RENDER MESSAGES ────────────────────────────────────────

function renderMessage(msg, username) {
  const isOwn   = msg.user_id === currentUser.id
  const isOwner = currentRoom?.owner_id === currentUser.id
  const canDel  = isOwn || isOwner
  const time    = new Date(msg.created_at).toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' })
  const name    = msg.username || username

  const el = document.createElement('div')
  el.className = 'msg-group ' + (isOwn ? 'own' : 'other')
  el.dataset.msgId = msg.id
  el.innerHTML = `
    <div class="msg-meta">${isOwn ? time : esc(name) + ' · ' + time}</div>
    <div class="msg-bubble">
      ${esc(msg.content)}
      ${canDel ? `<div class="msg-actions"><button class="btn-del-msg" title="Удалить">✕</button></div>` : ''}
    </div>
  `
  if (canDel) {
    el.querySelector('.btn-del-msg').onclick = () => deleteMessage(msg.id)
  }
  document.getElementById('messages').appendChild(el)
}

function prependMessage(msg) {
  const isOwn   = msg.user_id === currentUser.id
  const isOwner = currentRoom?.owner_id === currentUser.id
  const canDel  = isOwn || isOwner
  const time    = new Date(msg.created_at).toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' })

  const el = document.createElement('div')
  el.className = 'msg-group ' + (isOwn ? 'own' : 'other')
  el.dataset.msgId = msg.id
  el.innerHTML = `
    <div class="msg-meta">${isOwn ? time : esc(msg.username || '') + ' · ' + time}</div>
    <div class="msg-bubble">
      ${esc(msg.content)}
      ${canDel ? `<div class="msg-actions"><button class="btn-del-msg" title="Удалить">✕</button></div>` : ''}
    </div>
  `
  if (canDel) {
    el.querySelector('.btn-del-msg').onclick = () => deleteMessage(msg.id)
  }

  const container = document.getElementById('messages')
  const ref = container.querySelector('.load-more-wrap')
  if (ref) ref.after(el)
  else container.prepend(el)
}

function renderSystem(text) {
  const el = document.createElement('div')
  el.className = 'system-msg'
  el.textContent = text
  document.getElementById('messages').appendChild(el)
  scrollBottom()
}

function removeMessage(messageId) {
  const el = document.querySelector(`[data-msg-id="${messageId}"]`)
  if (el) {
    const bubble = el.querySelector('.msg-bubble')
    if (bubble) { bubble.innerHTML = '<span class="msg-deleted">сообщение удалено</span>' }
  }
}

function showTyping(username) {
  typingUsers[username] = true
  renderTyping()
  clearTimeout(typingTimer)
  typingTimer = setTimeout(() => { delete typingUsers[username]; renderTyping() }, 3000)
}

function renderTyping() {
  const names = Object.keys(typingUsers)
  document.getElementById('typing-bar').textContent = names.length ? names.join(', ') + ' печатает...' : ''
}

function scrollBottom() {
  const el = document.getElementById('messages')
  el.scrollTop = el.scrollHeight
}

// ── SEND ───────────────────────────────────────────────────

document.getElementById('send-btn').onclick = sendMessage

document.getElementById('message-input').onkeydown = e => {
  if (e.key === 'Enter' && !e.shiftKey) { sendMessage(); return }
  if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'typing' }))
}

function sendMessage() {
  const input   = document.getElementById('message-input')
  const content = input.value.trim()
  if (!content || !ws || ws.readyState !== WebSocket.OPEN) return
  ws.send(JSON.stringify({ type: 'send_message', content }))
  input.value = ''
  input.focus()
}

// ── DELETE MESSAGE ─────────────────────────────────────────

async function deleteMessage(messageId) {
  if (!currentRoom) return
  await del(`/api/rooms/${currentRoom.id}/messages/${messageId}`)
  // UI обновится через WS событие message_deleted
}

// ── DELETE ROOM ────────────────────────────────────────────

document.getElementById('btn-delete-room').onclick = () => {
  document.getElementById('delete-room-text').textContent =
    `Удалить комнату "${currentRoom?.name}"? Все сообщения будут удалены безвозвратно.`
  document.getElementById('modal-delete-room').classList.add('open')
}

document.getElementById('delete-room-cancel').onclick = () => {
  document.getElementById('modal-delete-room').classList.remove('open')
}

document.getElementById('delete-room-confirm').onclick = async () => {
  if (!currentRoom) return
  const roomId = currentRoom.id
  document.getElementById('modal-delete-room').classList.remove('open')
  await del(`/api/rooms/${roomId}`)

  // сбрасываем UI
  if (ws) { ws.onclose = null; ws.close(); ws = null }
  currentRoom = null
  document.getElementById('chat-area').style.display  = 'none'
  document.getElementById('chat-empty').style.display = 'flex'
  loadRooms()
}

// ── CREATE ROOM ────────────────────────────────────────────

document.getElementById('btn-new-room').onclick = () => {
  document.getElementById('modal-create').classList.add('open')
  setTimeout(() => document.getElementById('new-room-name').focus(), 50)
}

document.getElementById('modal-cancel').onclick = () =>
  document.getElementById('modal-create').classList.remove('open')

document.getElementById('modal-create').onclick = e => {
  if (e.target === e.currentTarget) document.getElementById('modal-create').classList.remove('open')
}

document.getElementById('new-room-name').onkeydown = e => {
  if (e.key === 'Enter') document.getElementById('modal-create-btn').click()
}

document.getElementById('modal-create-btn').onclick = async () => {
  const name        = document.getElementById('new-room-name').value.trim()
  const description = document.getElementById('new-room-desc').value.trim()
  const isPrivate   = document.getElementById('new-room-private').checked
  if (!name) return

  const data = await post('/api/rooms', { name, description, is_private: isPrivate })
  if (!data || data.error) { alert(data?.error || 'Ошибка'); return }

  document.getElementById('modal-create').classList.remove('open')
  document.getElementById('new-room-name').value  = ''
  document.getElementById('new-room-desc').value  = ''
  document.getElementById('new-room-private').checked = false

  await loadRooms()
  openRoom(data)
}

// ── UTILS ──────────────────────────────────────────────────

function esc(str) {
  if (!str) return ''
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}

// ── INIT ───────────────────────────────────────────────────

if (token && currentUser) showApp()
</script>
</body>
</html>
