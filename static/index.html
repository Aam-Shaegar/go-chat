<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoChat</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/auth.css">
  <link rel="stylesheet" href="/css/sidebar.css">
  <link rel="stylesheet" href="/css/chat.css">
  <link rel="stylesheet" href="/css/modals.css">
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">go<span>/</span>chat</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login">Войти</button>
      <button class="auth-tab" id="tab-register">Регистрация</button>
    </div>
    <div class="field"><label>Email</label><input id="auth-email" type="email" placeholder="you@example.com"></div>
    <div class="field" id="field-username" style="display:none"><label>Имя пользователя</label><input id="auth-username" type="text" placeholder="username"></div>
    <div class="field"><label>Пароль</label><input id="auth-password" type="password" placeholder="••••••••"></div>
    <button class="btn-primary" id="auth-submit">Войти</button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="layout">

    <div class="sidebar">
      <div class="sidebar-top">
        <div class="sidebar-brand">go/chat</div>
        <button class="btn-new-room" id="btn-new-room"><span class="plus">+</span>Создать комнату</button>
      </div>
      <div class="rooms-scroll">
        <div class="section-header" id="sec-my-hdr"><span class="section-label">Мои комнаты</span><span class="section-chevron open" id="chev-my">▶</span></div>
        <div class="section-body" id="sec-my"></div>
        <div class="section-header" id="sec-pub-hdr"><span class="section-label">Публичные</span><span class="section-chevron open" id="chev-pub">▶</span></div>
        <div class="section-body" id="sec-pub"></div>
        <div class="section-header" id="sec-dm-hdr"><span class="section-label">Личные сообщения</span><span class="section-chevron open" id="chev-dm">▶</span></div>
        <div class="section-body" id="sec-dm">
          <div class="room-item" id="btn-new-dm" style="color:var(--muted);font-size:13px;gap:8px;">
            <span style="font-size:16px;">✉</span> Новый диалог
          </div>
        </div>
      </div>
      <div class="sidebar-footer">
        <div class="user-avatar" id="user-avatar"></div>
        <div class="user-info">
          <div class="user-name" id="user-name"></div>
          <div class="user-status">онлайн</div>
        </div>
        <div class="sidebar-actions">
          <button class="btn-theme" id="btn-theme" title="Переключить тему">☀️</button>
          <button class="btn-logout" id="btn-logout" title="Выйти">⏻</button>
        </div>
      </div>
    </div>

    <div class="chat">
      <div class="chat-empty" id="chat-empty">
        <div class="chat-empty-icon">💬</div>
        <div class="chat-empty-text">Выберите комнату или начните диалог</div>
      </div>
      <div id="chat-area">
        <div class="chat-header">
          <span class="chat-header-icon" id="chat-icon">#</span>
          <span class="chat-header-name" id="chat-room-name"></span>
          <span class="chat-header-meta" id="chat-room-desc"></span>
          <div class="header-right">
            <div class="online-badge" id="online-badge" style="display:none">
              <div class="online-dot"></div><span id="online-count"></span>
            </div>
            <button class="btn-header" id="btn-members" title="Участники">👥</button>
            <button class="btn-header" id="btn-invite" title="Пригласить">🔗</button>
            <button class="btn-header" id="btn-leave" title="Покинуть">🚪</button>
            <button class="btn-header danger" id="btn-delete-room" title="Удалить комнату">🗑</button>
            <div class="ws-dot" id="ws-dot"></div>
          </div>
        </div>
        <div style="display:flex;flex:1;overflow:hidden;">
          <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
            <div class="messages-wrap">
              <div id="messages"></div>
              <div class="new-msgs-banner" id="new-msgs-banner">↓ Новые сообщения</div>
            </div>
            <div id="typing-bar"></div>
            <div class="chat-input-wrap">
              <div class="chat-input-inner">
                <input id="message-input" type="text" placeholder="Написать сообщение...">
                <button id="send-btn">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                  </svg>
                </button>
              </div>
            </div>
          </div>
          <div class="members-panel" id="members-panel">
            <div class="members-header">Участники</div>
            <div class="members-list" id="members-list"></div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="modal-create">
  <div class="modal">
    <div class="modal-title">Новая комната</div>
    <div class="field"><label>Название</label><input id="new-room-name" type="text" placeholder="general"></div>
    <div class="field"><label>Описание</label><input id="new-room-desc" type="text" placeholder="О чём эта комната?"></div>
    <div class="modal-toggle">
      <div><span>Приватная</span><small>Только по инвайту</small></div>
      <label class="toggle"><input type="checkbox" id="new-room-private"><span class="toggle-slider"></span></label>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" id="create-cancel">Отмена</button>
      <button class="btn-primary" id="create-confirm">Создать</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-delete-room">
  <div class="modal">
    <div class="modal-title">Удалить комнату</div>
    <div style="font-size:14px;color:var(--muted);margin-bottom:1.25rem;line-height:1.6" id="delete-room-text"></div>
    <div class="modal-actions">
      <button class="btn-ghost" id="del-room-cancel">Отмена</button>
      <button class="btn-danger" id="del-room-confirm">Удалить</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-leave">
  <div class="modal">
    <div class="modal-title">Покинуть комнату?</div>
    <div style="font-size:14px;color:var(--muted);margin-bottom:1.25rem;" id="leave-text"></div>
    <div class="modal-actions">
      <button class="btn-ghost" id="leave-cancel">Отмена</button>
      <button class="btn-danger" id="leave-confirm">Покинуть</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-invite">
  <div class="modal">
    <div class="modal-title">Пригласить в комнату</div>
    <div id="invite-content"></div>
    <div class="modal-actions" style="margin-top:0">
      <button class="btn-ghost" id="invite-new">Создать новую ссылку</button>
      <button class="btn-ghost" id="invite-close">Закрыть</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-new-dm">
  <div class="modal">
    <div class="modal-title">Новый диалог</div>
    <div class="field"><label>Поиск</label><input id="dm-search" type="text" placeholder="Имя пользователя..."></div>
    <div class="new-dm-list" id="dm-user-list"></div>
    <div class="modal-actions">
      <button class="btn-ghost" id="dm-cancel">Отмена</button>
    </div>
  </div>
</div>

<!-- JS: порядок важен — зависимости сначала -->
<script src="/js/api.js"></script>
<script src="/js/messages.js"></script>
<script src="/js/websocket.js"></script>
<script src="/js/sidebar.js"></script>
<script src="/js/room.js"></script>
<script src="/js/dm.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
