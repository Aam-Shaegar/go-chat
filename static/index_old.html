<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoChat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0e0e10;
      --bg2:       #17171a;
      --bg3:       #1e1e22;
      --border:    #2a2a30;
      --accent:    #6c63ff;
      --accent2:   #4f46e5;
      --text:      #e8e8ed;
      --muted:     #6b6b80;
      --danger:    #ef4444;
      --success:   #22c55e;
      --bubble-own: #6c63ff;
      --bubble-other: #1e1e22;
      --sidebar:   260px;
    }

    body {
      font-family: 'Geist', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      overflow: hidden;
    }

    #auth-screen {
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-card {
      width: 360px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
    }

    .auth-logo {
      font-family: 'Geist Mono', monospace;
      font-size: 20px;
      font-weight: 500;
      color: var(--accent);
      margin-bottom: 1.5rem;
    }

    .auth-logo span { color: var(--muted); }

    .auth-tabs {
      display: flex;
      gap: 4px;
      background: var(--bg3);
      border-radius: 8px;
      padding: 3px;
      margin-bottom: 1.25rem;
    }

    .auth-tab {
      flex: 1;
      padding: 7px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      font-family: 'Geist', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
    }

    .auth-tab.active { background: var(--bg2); color: var(--text); }

    .field { margin-bottom: 10px; }

    .field label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .field input {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      font-family: 'Geist', sans-serif;
      outline: none;
      transition: border-color 0.15s;
    }

    .field input:focus { border-color: var(--accent); }

    .btn-primary {
      width: 100%;
      padding: 10px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Geist', sans-serif;
      font-weight: 500;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-primary:hover { background: var(--accent2); }
    .btn-primary:active { transform: scale(0.98); }

    .auth-error {
      margin-top: 10px;
      font-size: 13px;
      color: var(--danger);
      min-height: 18px;
    }

    #app-screen { display: none; height: 100dvh; }

    .layout {
      display: grid;
      grid-template-columns: var(--sidebar) 1fr;
      height: 100dvh;
    }

    .sidebar {
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-top {
      padding: 14px 12px 10px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-brand {
      font-family: 'Geist Mono', monospace;
      font-size: 15px;
      font-weight: 500;
      color: var(--accent);
      margin-bottom: 10px;
    }

    .btn-new-room {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      font-family: 'Geist', sans-serif;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: border-color 0.15s;
    }

    .btn-new-room:hover { border-color: var(--accent); color: var(--accent); }

    .btn-new-room .plus {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .sidebar-section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--muted);
      padding: 12px 14px 6px;
      text-transform: uppercase;
    }

    #rooms-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 8px;
    }

    #rooms-list::-webkit-scrollbar { width: 4px; }
    #rooms-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .room-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.1s;
      margin-bottom: 1px;
    }

    .room-item:hover { background: var(--bg3); }
    .room-item.active { background: rgba(108, 99, 255, 0.15); }

    .room-hash {
      font-size: 16px;
      color: var(--muted);
      font-family: 'Geist Mono', monospace;
      flex-shrink: 0;
    }

    .room-item.active .room-hash { color: var(--accent); }

    .room-info { flex: 1; overflow: hidden; }

    .room-item-name {
      font-size: 14px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .room-item.active .room-item-name { color: var(--accent); }

    .room-item-desc {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 1px;
    }

    .sidebar-footer {
      padding: 12px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .user-info { flex: 1; overflow: hidden; }

    .user-name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-status { font-size: 11px; color: var(--success); }

    .btn-logout {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.15s;
      line-height: 1;
    }

    .btn-logout:hover { color: var(--danger); }

    .chat {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      background: var(--bg);
    }

    .chat-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
    }

    .chat-empty-icon { font-size: 48px; opacity: 0.3; }
    .chat-empty-text { font-size: 15px; }

    #chat-area {
      display: none;
      flex-direction: column;
      height: 100dvh;
    }

    .chat-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg2);
    }

    .chat-header-hash {
      font-family: 'Geist Mono', monospace;
      font-size: 18px;
      color: var(--accent);
    }

    .chat-header-name { font-size: 15px; font-weight: 600; }

    .chat-header-meta { font-size: 12px; color: var(--muted); margin-left: 4px; }

    .ws-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      margin-left: auto;
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .ws-dot.connected { background: var(--success); }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg-group {
      display: flex;
      flex-direction: column;
      max-width: 65%;
    }

    .msg-group.own { align-self: flex-end; align-items: flex-end; }
    .msg-group.other { align-self: flex-start; }
    .msg-group + .msg-group { margin-top: 8px; }

    .msg-meta { font-size: 11px; color: var(--muted); margin-bottom: 4px; padding: 0 4px; }

    .msg-bubble {
      padding: 9px 13px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
      margin-bottom: 2px;
    }

    .msg-group.own .msg-bubble {
      background: var(--bubble-own);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .msg-group.other .msg-bubble {
      background: var(--bubble-other);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .system-msg {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      padding: 6px 0;
      font-family: 'Geist Mono', monospace;
    }

    #typing-bar {
      height: 22px;
      padding: 0 20px;
      font-size: 12px;
      color: var(--muted);
      font-style: italic;
    }

    .chat-input-wrap {
      padding: 12px 16px 16px;
      background: var(--bg2);
      border-top: 1px solid var(--border);
    }

    .chat-input-inner {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 6px 6px 6px 14px;
      transition: border-color 0.15s;
    }

    .chat-input-inner:focus-within { border-color: var(--accent); }

    #message-input {
      flex: 1;
      background: none;
      border: none;
      color: var(--text);
      font-size: 14px;
      font-family: 'Geist', sans-serif;
      outline: none;
      padding: 6px 0;
    }

    #message-input::placeholder { color: var(--muted); }

    #send-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--accent);
      border: none;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    #send-btn:hover { background: var(--accent2); }
    #send-btn:active { transform: scale(0.92); }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      width: 360px;
    }

    .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 1.25rem; }
    .modal .field input { background: var(--bg); }

    .modal-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      margin-bottom: 10px;
    }

    .modal-toggle span { font-size: 14px; color: var(--text); }
    .modal-toggle small { font-size: 11px; color: var(--muted); display: block; }

    .toggle { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 11px;
      cursor: pointer;
      transition: 0.2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--muted);
      top: 2px;
      left: 2px;
      transition: 0.2s;
    }

    .toggle input:checked + .toggle-slider { background: var(--accent); border-color: var(--accent); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(18px); background: white; }

    .modal-actions { display: flex; gap: 8px; margin-top: 4px; }

    .btn-ghost {
      flex: 1;
      padding: 9px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      font-family: 'Geist', sans-serif;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .btn-ghost:hover { border-color: var(--muted); }
    .modal-actions .btn-primary { margin-top: 0; }
  </style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">go<span>/</span>chat</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login">Войти</button>
      <button class="auth-tab" id="tab-register">Регистрация</button>
    </div>
    <div class="field">
      <label>Email</label>
      <input id="auth-email" type="email" placeholder="you@example.com">
    </div>
    <div class="field" id="field-username" style="display:none">
      <label>Имя пользователя</label>
      <input id="auth-username" type="text" placeholder="username">
    </div>
    <div class="field">
      <label>Пароль</label>
      <input id="auth-password" type="password" placeholder="••••••••">
    </div>
    <button class="btn-primary" id="auth-submit">Войти</button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<div id="app-screen">
  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-top">
        <div class="sidebar-brand">go/chat</div>
        <button class="btn-new-room" id="btn-new-room">
          <span class="plus">+</span>
          Создать комнату
        </button>
      </div>
      <div class="sidebar-section-label">Публичные комнаты</div>
      <div id="rooms-list"></div>
      <div class="sidebar-footer">
        <div class="user-avatar" id="user-avatar"></div>
        <div class="user-info">
          <div class="user-name" id="user-name"></div>
          <div class="user-status">онлайн</div>
        </div>
        <button class="btn-logout" id="btn-logout" title="Выйти">⏻</button>
      </div>
    </div>

    <div class="chat">
      <div class="chat-empty" id="chat-empty">
        <div class="chat-empty-icon">💬</div>
        <div class="chat-empty-text">Выберите комнату чтобы начать</div>
      </div>
      <div id="chat-area">
        <div class="chat-header">
          <span class="chat-header-hash">#</span>
          <span class="chat-header-name" id="chat-room-name"></span>
          <span class="chat-header-meta" id="chat-room-desc"></span>
          <div class="ws-dot" id="ws-dot"></div>
        </div>
        <div id="messages"></div>
        <div id="typing-bar"></div>
        <div class="chat-input-wrap">
          <div class="chat-input-inner">
            <input id="message-input" type="text" placeholder="Написать сообщение...">
            <button id="send-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-create">
  <div class="modal">
    <div class="modal-title">Новая комната</div>
    <div class="field">
      <label>Название</label>
      <input id="new-room-name" type="text" placeholder="general">
    </div>
    <div class="field">
      <label>Описание</label>
      <input id="new-room-desc" type="text" placeholder="О чём эта комната?">
    </div>
    <div class="modal-toggle">
      <div>
        <span>Приватная</span>
        <small>Только по инвайту</small>
      </div>
      <label class="toggle">
        <input type="checkbox" id="new-room-private">
        <span class="toggle-slider"></span>
      </label>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" id="modal-cancel">Отмена</button>
      <button class="btn-primary" id="modal-create-btn">Создать</button>
    </div>
  </div>
</div>

<script>
const API = ''
let token = localStorage.getItem('gochat_token')
let currentUser = JSON.parse(localStorage.getItem('gochat_user') || 'null')
let currentRoom = null
let ws = null
let typingTimer = null
let typingUsers = {}
let isLoginMode = true

document.getElementById('tab-login').onclick = () => switchTab(true)
document.getElementById('tab-register').onclick = () => switchTab(false)

function switchTab(login) {
  isLoginMode = login
  document.getElementById('tab-login').classList.toggle('active', login)
  document.getElementById('tab-register').classList.toggle('active', !login)
  document.getElementById('field-username').style.display = login ? 'none' : 'block'
  document.getElementById('auth-submit').textContent = login ? 'Войти' : 'Зарегистрироваться'
  document.getElementById('auth-error').textContent = ''
}

document.getElementById('auth-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('auth-submit').click()
})

document.getElementById('auth-submit').onclick = async () => {
  const email = document.getElementById('auth-email').value.trim()
  const password = document.getElementById('auth-password').value
  const username = document.getElementById('auth-username').value.trim()
  if (!email || !password) { setAuthError('Заполните все поля'); return }
  if (!isLoginMode && !username) { setAuthError('Введите имя пользователя'); return }
  const btn = document.getElementById('auth-submit')
  btn.textContent = '...'
  btn.disabled = true
  try {
    const path = isLoginMode ? '/api/auth/login' : '/api/auth/register'
    const body = isLoginMode ? { email, password } : { email, password, username }
    const data = await post(path, body)
    if (data.error) { setAuthError(data.error); return }
    token = data.access_token
    currentUser = data.user
    localStorage.setItem('gochat_token', token)
    localStorage.setItem('gochat_user', JSON.stringify(currentUser))
    showApp()
  } finally {
    btn.textContent = isLoginMode ? 'Войти' : 'Зарегистрироваться'
    btn.disabled = false
  }
}

function setAuthError(msg) { document.getElementById('auth-error').textContent = msg }

function showApp() {
  document.getElementById('auth-screen').style.display = 'none'
  document.getElementById('app-screen').style.display = 'block'
  document.getElementById('user-name').textContent = currentUser.username
  document.getElementById('user-avatar').textContent = currentUser.username[0].toUpperCase()
  loadRooms()
}

document.getElementById('btn-logout').onclick = () => {
  if (ws) ws.close()
  localStorage.clear()
  location.reload()
}

async function loadRooms() {
  const rooms = await get('/api/rooms')
  const list = document.getElementById('rooms-list')
  list.innerHTML = ''
  if (!Array.isArray(rooms) || rooms.length === 0) {
    list.innerHTML = '<div style="padding:12px 14px;font-size:13px;color:var(--muted)">Нет комнат. Создайте первую!</div>'
    return
  }
  rooms.forEach(room => {
    const el = document.createElement('div')
    el.className = 'room-item' + (currentRoom?.id === room.id ? ' active' : '')
    el.dataset.id = room.id
    el.innerHTML = `
      <span class="room-hash">#</span>
      <div class="room-info">
        <div class="room-item-name">${esc(room.name)}</div>
        ${room.description ? `<div class="room-item-desc">${esc(room.description)}</div>` : ''}
      </div>
    `
    el.onclick = () => openRoom(room)
    list.appendChild(el)
  })
}

async function openRoom(room) {
  if (currentRoom?.id === room.id) return
  await post(`/api/rooms/${room.id}/join`, {})
  currentRoom = room
  document.querySelectorAll('.room-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === room.id)
  })
  document.getElementById('chat-empty').style.display = 'none'
  const area = document.getElementById('chat-area')
  area.style.display = 'flex'
  document.getElementById('chat-room-name').textContent = room.name
  document.getElementById('chat-room-desc').textContent = room.description || ''
  document.getElementById('messages').innerHTML = ''
  document.getElementById('typing-bar').textContent = ''
  typingUsers = {}
  const history = await get(`/api/rooms/${room.id}/messages`)
  if (Array.isArray(history)) history.forEach(msg => renderMessage(msg, msg.username || ''))
  connectWS(room.id)
  scrollBottom()
}

function connectWS(roomID) {
  if (ws) { ws.onclose = null; ws.close() }
  setWSDot(false)
  const url = `ws://${location.host}/ws/rooms/${roomID}?token=${token}&username=${encodeURIComponent(currentUser.username)}`
  ws = new WebSocket(url)
  ws.onopen = () => setWSDot(true)
  ws.onmessage = e => {
    const msg = JSON.parse(e.data)
    switch (msg.type) {
      case 'new_message':
        renderMessage(msg.payload.message, msg.payload.username)
        scrollBottom()
        break
      case 'user_typing':
        if (msg.payload.user_id !== currentUser.id) showTyping(msg.payload.username)
        break
      case 'user_joined':
        renderSystem(msg.payload.username + ' вошёл в комнату')
        break
      case 'user_left':
        renderSystem(msg.payload.username + ' покинул комнату')
        break
    }
  }
  ws.onclose = () => {
    setWSDot(false)
    setTimeout(() => { if (currentRoom?.id === roomID) connectWS(roomID) }, 2000)
  }
  ws.onerror = () => setWSDot(false)
}

function setWSDot(connected) {
  document.getElementById('ws-dot').className = 'ws-dot' + (connected ? ' connected' : '')
}

function renderMessage(msg, username) {
  const isOwn = msg.user_id === currentUser.id
  const time = new Date(msg.created_at).toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' })
  const el = document.createElement('div')
  el.className = 'msg-group ' + (isOwn ? 'own' : 'other')
  el.innerHTML = `
    <div class="msg-meta">${isOwn ? time : esc(username) + ' · ' + time}</div>
    <div class="msg-bubble">${esc(msg.content)}</div>
  `
  document.getElementById('messages').appendChild(el)
}

function renderSystem(text) {
  const el = document.createElement('div')
  el.className = 'system-msg'
  el.textContent = text
  document.getElementById('messages').appendChild(el)
  scrollBottom()
}

function showTyping(username) {
  typingUsers[username] = true
  renderTyping()
  clearTimeout(typingTimer)
  typingTimer = setTimeout(() => { delete typingUsers[username]; renderTyping() }, 3000)
}

function renderTyping() {
  const names = Object.keys(typingUsers)
  document.getElementById('typing-bar').textContent = names.length ? names.join(', ') + ' печатает...' : ''
}

function scrollBottom() {
  const el = document.getElementById('messages')
  el.scrollTop = el.scrollHeight
}

document.getElementById('send-btn').onclick = sendMessage

document.getElementById('message-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { sendMessage(); return }
  if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'typing' }))
})

function sendMessage() {
  const input = document.getElementById('message-input')
  const content = input.value.trim()
  if (!content || !ws || ws.readyState !== WebSocket.OPEN) return
  ws.send(JSON.stringify({ type: 'send_message', content }))
  input.value = ''
  input.focus()
}

document.getElementById('btn-new-room').onclick = () => {
  document.getElementById('modal-create').classList.add('open')
  setTimeout(() => document.getElementById('new-room-name').focus(), 50)
}

document.getElementById('modal-cancel').onclick = closeModal

document.getElementById('modal-create').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal()
})

document.getElementById('new-room-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('modal-create-btn').click()
})

document.getElementById('modal-create-btn').onclick = async () => {
  const name = document.getElementById('new-room-name').value.trim()
  const description = document.getElementById('new-room-desc').value.trim()
  const isPrivate = document.getElementById('new-room-private').checked
  if (!name) return
  const data = await post('/api/rooms', { name, description, is_private: isPrivate })
  if (data.error) { alert(data.error); return }
  closeModal()
  document.getElementById('new-room-name').value = ''
  document.getElementById('new-room-desc').value = ''
  document.getElementById('new-room-private').checked = false
  await loadRooms()
  openRoom(data)
}

function closeModal() { document.getElementById('modal-create').classList.remove('open') }

async function post(path, body) {
  const headers = { 'Content-Type': 'application/json' }
  if (token) headers['Authorization'] = 'Bearer ' + token
  const res = await fetch(path, { method: 'POST', headers, body: JSON.stringify(body) })
  return res.json()
}

async function get(path) {
  const res = await fetch(path, { headers: { 'Authorization': 'Bearer ' + token } })
  return res.json()
}

function esc(str) {
  if (!str) return ''
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}

if (token && currentUser) showApp()
</script>
